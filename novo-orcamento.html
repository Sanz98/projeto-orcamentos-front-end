<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Novo Orçamento</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray">

    <div class="container">
        <header class="page-header">
            <h2>📝 Gerar Novo Orçamento</h2>
            <button onclick="window.location.href='dashboard.html'" class="btn-secondary btn-small">
                ← Voltar
            </button>
        </header>
        
        <hr>

        <form id="formOrcamento">
            
            <section class="card-section">
                <h4 class="section-title">Dados Gerais</h4>
                
                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Cliente:</label>
                        <select id="selectCliente" required>
                            <option value="">Selecione um cliente...</option>
                            </select>
                    </div>
                    <div class="form-group">
                        <label>Prazo de Entrega:</label>
                        <input type="date" id="prazoEntrega" required>
                    </div>
                </div>

                <div class="form-grid-2">
                    <div class="form-group">
                        <label>Validade (dias):</label>
                        <input type="number" id="validadeDias" value="15">
                    </div>
                    <div class="form-group">
                        <label>Condição Pagamento:</label>
                        <input type="text" id="condicaoPagamento" placeholder="Ex: 50% entrada + 50% entrega">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Observações:</label>
                    <textarea id="observacoes" rows="3" placeholder="Detalhes gerais do projeto..."></textarea>
                </div>
            </section>

            <section class="card-section bg-highlight">
                <h4 class="section-title">Adicionar Item ao Orçamento</h4>
                
                <div class="form-grid-custom-item">
                    <div class="form-group">
                        <label>Ambiente / Título</label>
                        <input type="text" id="itemTitulo" placeholder="Ex: Armário Cozinha">
                    </div>
                    <div class="form-group">
                        <label>Qtd</label>
                        <input type="number" id="itemQtd" value="1" min="1">
                    </div>
                    <div class="form-group">
                        <label>Valor Unit. (R$)</label>
                        <input type="number" id="itemValor" placeholder="0,00" step="0.01">
                    </div>
                </div>

                <div class="form-group">
                    <input type="text" id="itemDescricao" placeholder="Detalhes técnicos (Material, cor, puxadores...)">
                </div>

                <button type="button" onclick="adicionarItemNaLista()" class="btn-info width-auto">
                    + Adicionar Item na Lista
                </button>
            </section>

            <div class="table-container">
                <table class="tabela-orcamento">
                    <thead>
                        <tr>
                            <th>Item / Ambiente</th>
                            <th class="text-center">Qtd</th>
                            <th class="text-right">Valor Unit.</th>
                            <th class="text-right">Subtotal</th>
                            <th class="text-center">Ação</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaItens">
                        </tbody>
                </table>
            </div>

            <div class="total-box">
                <span>Total do Orçamento:</span>
                <span class="valor-destaque">R$ <span id="valorTotalDisplay">0.00</span></span>
            </div>

            <br>
            <button type="submit" class="btn-success btn-large">💾 Finalizar e Salvar Orçamento</button>
        </form>
    </div>

    <script src="js/novo-orcamento.js"></script>
</body>
</html>
