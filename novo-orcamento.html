<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Focco</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div>
                <h2>Focco</h2>
                <div class="menu">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="clientes.html">Clientes</a>
                    <a href="equipe.html" id="menu-equipe">Equipe</a>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn">Sair</button>
        </nav>

        <main class="main-content">
            <header>
                <h1>Criar Orçamento</h1>
            </header>
            <form id="formOrcamento">
                <div class="card">
                    <h3>Dados Gerais</h3>
                    <div class="form-group">
                        <label>Cliente *</label>
                        <select id="selectCliente" required>
                            <option value="">Carregando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Observações</label>
                        <textarea id="observacoes" rows="3"></textarea>
                    </div>
                </div>

                <div class="card">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 15px;">
                        <h3>Itens do Projeto</h3>
                        <button type="button" class="btn btn-sm btn-primary" onclick="adicionarLinhaItem()">+ Adicionar
                            Item</button>
                    </div>
                    <div id="lista-itens">
                    </div>
                </div>

                <div class="card" style="text-align: right;">
                    <button type="submit" class="btn btn-primary btn-lg">Finalizar Orçamento</button>
                </div>
            </form>
        </main>

        <template id="template-item">
            <div class="item-row"
                style="background: #f8fafc; padding: 15px; border: 1px solid #e2e8f0; margin-bottom: 10px; border-radius: 6px;">
                <div class="form-group">
                    <label>Título Ambiente</label>
                    <input type="text" class="titulo" placeholder="Ex: Cozinha Planejada" required>
                </div>
                <div class="form-group">
                    <label>Descrição Detalhada</label>
                    <input type="text" class="descricao" required>
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Valor Unit.</label>
                        <input type="number" class="valor" step="0.01" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Qtd</label>
                        <input type="number" class="qtd" value="1" required>
                    </div>
                </div>
                <button type="button" class="btn btn-danger" onclick="removerLinha(this)">Remover</button>
            </div>
        </template>

        <script src="js/config.js"></script>
        <script src="js/novo-orcamento.js"></script>
    </div>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
