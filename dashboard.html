<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Focco</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar">
            <div>
                <h2>Focco</h2>
                <div class="menu">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="clientes.html">Clientes</a>
                    <a href="equipe.html" id="menu-equipe">Equipe</a>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn">Sair</button>
        </nav>

        <main class="main-content">
            <header>
                <h1>Visão Geral</h1>
                <span id="user-name" style="font-weight: bold;"></span>
            </header>

            <div class="card">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3>Últimos Orçamentos</h3>
                    <a href="novo-orcamento.html" class="btn btn-primary">+ Novo Orçamento</a>
                </div>
                <table id="tabela-orcamentos">
                    <thead>
                        <tr>
                            <th>Cliente</th>
                            <th>Status</th>
                            <th>Valor Total</th>
                            <th>Data</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
