<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Focco</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div>
                <h2>Focco</h2>
                <div class="menu">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="clientes.html">Clientes</a>
                    <a href="equipe.html" id="menu-equipe">Equipe</a>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn">Sair</button>
        </nav>

        <main class="main-content">
            <header>
                <h1>Novo Cliente</h1>
            </header>
            <div class="card" style="max-width: 600px;">
                <form id="formCliente">
                    <div class="form-group">
                        <label>Nome Completo *</label>
                        <input type="text" id="nomeCliente" required>
                    </div>
                    <div class="form-group">
                        <label>Telefone</label>
                        <input type="text" id="telefoneCliente" maxlength="12" placeholder="Ex: 11999999999">
                    </div>
                    <button type="submit" class="btn btn-primary">Salvar</button>
                    <a href="clientes.html" class="btn btn-danger">Cancelar</a>
                </form>
            </div>
        </main>
        <script src="js/config.js"></script>
        <script src="js/novo-cliente.js"></script>
    </div>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
