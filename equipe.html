<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Dashboard - Focco</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <div class="container">
        <nav class="sidebar">
            <div>
                <h2>Focco</h2>
                <div class="menu">
                    <a href="dashboard.html" class="active">Dashboard</a>
                    <a href="clientes.html">Clientes</a>
                    <a href="equipe.html" id="menu-equipe">Equipe</a>
                </div>
            </div>
            <button onclick="logout()" class="logout-btn">Sair</button>
        </nav>

        <main class="main-content">
            <header>
                <h1>Gestão de Equipe</h1>
            </header>

            <div class="card">
                <h3>Cadastrar Novo Vendedor</h3>
                <form id="formVendedor" style="display: flex; gap: 10px; align-items: flex-end;">
                    <div class="form-group" style="flex: 1;">
                        <label>Nome</label>
                        <input type="text" id="novoNome" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Email</label>
                        <input type="email" id="novoEmail" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Senha</label>
                        <input type="password" id="novaSenha" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-bottom: 15px;">Cadastrar</button>
                </form>
            </div>

            <div class="card">
                <h3>Vendedores Ativos</h3>
                <table id="tabela-equipe">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Email</th>
                            <th>Perfil</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </main>
        <script src="js/config.js"></script>
        <script src="js/equipe.js"></script>
    </div>
    <script src="js/config.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
