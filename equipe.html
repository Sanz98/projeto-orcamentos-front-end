<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Gerenciar Equipe</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <nav style="background: #333; color: white; padding: 15px; margin-bottom: 30px;">
        <div style="max-width: 1000px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center;">
            <span style="font-size: 1.2rem; font-weight: bold;">🛠️ Sistema Marcenaria</span>
            <a href="dashboard.html" style="color: white; text-decoration: none; font-size: 0.9rem;">← Voltar ao Painel</a>
        </div>
    </nav>

    <div class="container">
        <div class="flex-between">
            <h2>Gerenciar Vendedores</h2>
            <button onclick="window.location.href='dashboard.html'" class="btn-secondary" style="width: auto;">Voltar</button>
        </div>
        <hr>

        <div style="background: #f1f3f5; padding: 20px; border-radius: 8px; margin-bottom: 30px; border: 1px solid #e1e4e8;">
            <h3 style="margin-top: 0;">Adicionar Novo Vendedor</h3>
            <form id="formVendedor" class="flex-row" style="align-items: flex-end; flex-wrap: wrap;">
                <div style="flex: 1; min-width: 200px;">
                    <label>Nome:</label>
                    <input type="text" id="nomeVend" required placeholder="Nome do funcionário">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>E-mail:</label>
                    <input type="email" id="emailVend" required placeholder="login@empresa.com">
                </div>
                <div style="flex: 1; min-width: 200px;">
                    <label>Senha Inicial:</label>
                    <input type="password" id="senhaVend" required placeholder="******">
                </div>
                <div style="flex: 0 0 auto;">
                    <button type="submit" class="btn-success" style="margin-bottom: 18px;">+ Adicionar</button>
                </div>
            </form>
        </div>

        <h3>Equipe Atual</h3>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>Email</th>
                    <th>Perfil</th>
                    <th style="width: 120px; text-align: center;">Ações</th>
                </tr>
            </thead>
            <tbody id="tabelaVendedores">
                <tr><td colspan="4" style="text-align:center;">Carregando...</td></tr>
            </tbody>
        </table>
    </div>

    <div id="modalEditar" class="modal">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <h3>Editar Vendedor</h3>
            <hr>
            <form id="formEditar">
                <input type="hidden" id="editId">

                <label>Nome Completo:</label>
                <input type="text" id="editNome" required>

                <label>E-mail:</label>
                <input type="email" id="editEmail" required>

                <div style="margin-top: 20px; text-align: right;">
                    <button type="button" onclick="fecharModal()" class="btn-secondary" style="width: auto; margin-right: 10px;">Cancelar</button>
                    <button type="submit" class="btn-primary" style="width: auto;">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/equipe.js"></script>
</body>
</html>
